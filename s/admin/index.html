<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1d20" media="(prefers-color-scheme: dark)">
  <meta name="robots" content="noindex,nofollow">
  <title>shares · neves.cloud</title>
  <link rel="icon" type="image/svg+xml" href="../../icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: light dark;
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-soft: #fafafb;
      --ink: #1d1d1f;
      --ink-muted: #6e6e73;
      --ink-faint: #9a9a9f;
      --border-subtle: rgba(0,0,0,0.06);
      --border-default: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --accent: #006d51;
      --accent-soft: rgba(0,109,81,0.08);
      --warn: #b7791f;
      --warn-soft: rgba(183,121,31,0.10);
      --danger: #c84e00;
      --danger-soft: rgba(200,78,0,0.10);
      --radius: 8px;
      --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
      --t-display: 1.25rem;
      --t-body:    0.9375rem;
      --t-caption: 0.75rem;
      --t-micro:   0.6875rem;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1d20;
        --surface: #262a2e;
        --surface-soft: #1f2226;
        --ink: #e9ecef;
        --ink-muted: #adb5bd;
        --ink-faint: #6c757d;
        --border-subtle: rgba(255,255,255,0.06);
        --border-default: rgba(255,255,255,0.10);
        --border-strong: rgba(255,255,255,0.18);
        --accent: #66b288;
        --accent-soft: rgba(102,178,136,0.10);
        --warn: #d4a046;
        --warn-soft: rgba(212,160,70,0.10);
        --danger: #e07b3c;
        --danger-soft: rgba(224,123,60,0.10);
      }
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", ui-sans-serif, sans-serif;
      line-height: 1.5;
      font-synthesis: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
      gap: 1.5rem;
    }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    header {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      animation: fade-up 0.5s var(--ease) both;
    }
    .back {
      font-size: var(--t-caption);
      color: var(--ink-muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      transition: color 0.15s var(--ease);
      width: fit-content;
    }
    .back:hover { color: var(--ink); }
    .page-title {
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Helvetica Neue", ui-sans-serif, sans-serif;
      font-size: var(--t-display);
      letter-spacing: -0.02em;
      line-height: 1.1;
      font-weight: 600;
    }
    .page-sub {
      font-size: var(--t-caption);
      color: var(--ink-muted);
      max-width: 540px;
      line-height: 1.5;
    }

    main {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      animation: fade-up 0.5s 0.08s var(--ease) both;
    }

    .file-row {
      background: var(--surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius);
      padding: 0.95rem 1.1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.85rem;
      align-items: start;
    }

    .file-head {
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
      margin-bottom: 0.25rem;
      flex-wrap: wrap;
    }
    .file-name {
      font-size: var(--t-body);
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .badge {
      font-size: var(--t-micro);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 100px;
      border: 1px solid transparent;
    }
    .badge.unshared { color: var(--ink-faint); border-color: var(--border-subtle); }
    .badge.shared   { color: var(--accent); background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 18%, transparent); }
    .badge.stale    { color: var(--warn); background: var(--warn-soft); border-color: color-mix(in srgb, var(--warn) 22%, transparent); }
    .file-meta {
      font-size: var(--t-micro);
      color: var(--ink-faint);
      font-family: ui-monospace, SFMono-Regular, monospace;
      letter-spacing: 0.02em;
    }
    .file-detail {
      font-size: var(--t-caption);
      color: var(--ink-muted);
      margin-top: 0.45rem;
      line-height: 1.45;
    }
    .url-display {
      margin-top: 0.65rem;
      padding: 0.55rem 0.7rem;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: var(--t-micro);
      color: var(--ink);
      word-break: break-all;
      line-height: 1.5;
      cursor: pointer;
      transition: border-color 0.15s var(--ease);
    }
    .url-display:hover { border-color: var(--border-strong); }
    .url-display.copied { border-color: var(--accent); color: var(--accent); }
    .url-display.copied::after { content: ' \u2713 copied'; }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }
    .btn {
      font-size: var(--t-micro);
      letter-spacing: 0.02em;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid var(--border-default);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s var(--ease), background 0.15s var(--ease), color 0.15s var(--ease);
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { border-color: var(--border-strong); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.primary:hover:not(:disabled) { opacity: 0.88; }
    .btn.danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 25%, var(--border-default)); }
    .btn.danger:hover:not(:disabled) { background: var(--danger-soft); }
    .btn.ghost { color: var(--ink-muted); border-color: transparent; }
    .btn.ghost:hover:not(:disabled) { color: var(--ink); border-color: var(--border-subtle); }

    .empty {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--ink-muted);
      font-size: var(--t-caption);
      border: 1px dashed var(--border-default);
      border-radius: var(--radius);
    }
    .empty code {
      font-family: ui-monospace, SFMono-Regular, monospace;
      background: var(--surface);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 0.9em;
      color: var(--ink);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--bg);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: var(--t-caption);
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s var(--ease);
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); color: #fff; }

    .pattern-note {
      margin-top: 1.5rem;
      padding: 0.85rem 1.1rem;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      font-size: var(--t-micro);
      color: var(--ink-muted);
      line-height: 1.55;
    }
    .pattern-note strong { color: var(--ink); font-weight: 600; }
    .pattern-note code {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 0.95em;
      background: var(--bg);
      border: 1px solid var(--border-subtle);
      border-radius: 3px;
      padding: 1px 5px;
      color: var(--ink);
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 540px) {
      .file-row { grid-template-columns: 1fr; }
      .actions { flex-direction: row; align-items: center; flex-wrap: wrap; align-self: flex-start; }
    }
  </style>
</head>
<body>

  <header>
    <a class="back" href="../../">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9.5 6H2.5M2.5 6L5.5 3M2.5 6L5.5 9"/>
      </svg>
      neves.cloud
    </a>
    <h1 class="page-title">Shares</h1>
    <p class="page-sub">Files in <code style="font-family: ui-monospace, monospace; font-size: 0.95em; padding: 0 3px; background: var(--surface); border-radius: 3px;">shares/</code> can be encrypted and uploaded as secret gists. Each share is a URL of the form <code style="font-family: ui-monospace, monospace; font-size: 0.95em; padding: 0 3px; background: var(--surface); border-radius: 3px;">neves.cloud/s/#{id}.{key}</code>. Anyone with the URL can decrypt; revoke deletes the gist instantly.</p>
  </header>

  <main id="main">
    <p class="empty">loading\u2026</p>
  </main>

  <div class="toast" id="toast"></div>

<script type="module">
'use strict';

// ── Auth gate ──────────────────────────────────────────────────────
const AUTH_KEY = '__neevs_auth';
const auth = (() => { try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch { return null; } })();
if (!auth?.token || auth.username !== 'jonasneves') {
  location.href = '../../';
}

const REPO = 'jonasneves/jonasneves.github.io';
const SHARES_DIR = 'shares';
const PAYLOAD_FILE = 'payload.json';
const REGISTRY_DESC = '[neves-share-registry]';
const REGISTRY_FILE = 'registry.json';
const REGISTRY_GIST_KEY = '__neevs_share_registry_gist';
const ORIGIN = location.origin;

// ── base64url helpers ──────────────────────────────────────────────
function b64urlEncode(bytes) {
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// ── Crypto ─────────────────────────────────────────────────────────
async function encryptText(plaintext) {
  const enc = new TextEncoder().encode(plaintext);
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const key = await crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt']);
  const ct  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc);
  const raw = await crypto.subtle.exportKey('raw', key);
  return {
    iv:  b64urlEncode(iv),
    ct:  b64urlEncode(new Uint8Array(ct)),
    key: b64urlEncode(new Uint8Array(raw)),
  };
}

async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return b64urlEncode(new Uint8Array(hash));
}

// ── GitHub API ─────────────────────────────────────────────────────
async function gh(path, init = {}) {
  return fetch(`https://api.github.com${path}`, {
    ...init,
    headers: {
      Authorization: `Bearer ${auth.token}`,
      Accept: 'application/vnd.github+json',
      ...(init.headers || {}),
    },
  });
}

async function listSourceFiles() {
  const res = await gh(`/repos/${REPO}/contents/${SHARES_DIR}`);
  if (!res.ok) throw new Error('LIST_FAILED');
  const items = await res.json();
  return items
    .filter(i => i.type === 'file' && i.name !== 'index.json' && /\.html?$/i.test(i.name))
    .map(i => ({ name: i.name, path: i.path, sha: i.sha, size: i.size }));
}

async function fetchSourceContent(path) {
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURIComponent(path)}`, {
    headers: { Authorization: `Bearer ${auth.token}`, Accept: 'application/vnd.github.v3.raw' },
  });
  if (!res.ok) throw new Error('FETCH_SOURCE_FAILED');
  return res.text();
}

// ── Registry (gist-based) ──────────────────────────────────────────
// Single secret gist holds the registry. Bootstrap order:
// 1. localStorage cache for fast lookup across sessions
// 2. Description-based search of user's gists if cache misses
// 3. Create new gist (auto-migrating from legacy shares/index.json if present)
async function findRegistryGist() {
  const cached = localStorage.getItem(REGISTRY_GIST_KEY);
  if (cached) {
    const res = await gh(`/gists/${cached}`);
    if (res.ok) return cached;
    localStorage.removeItem(REGISTRY_GIST_KEY);
  }
  for (let page = 1; page <= 5; page++) {
    const res = await gh(`/gists?per_page=100&page=${page}`);
    if (!res.ok) break;
    const gists = await res.json();
    if (!gists.length) break;
    const found = gists.find(g => g.description === REGISTRY_DESC);
    if (found) {
      localStorage.setItem(REGISTRY_GIST_KEY, found.id);
      return found.id;
    }
    if (gists.length < 100) break;
  }
  return null;
}

async function readRegistryFromGist(gistId) {
  const res = await gh(`/gists/${gistId}`);
  if (!res.ok) throw new Error('REGISTRY_READ_FAILED');
  const gist = await res.json();
  const file = gist.files[REGISTRY_FILE];
  const content = file?.content || '{"version":1,"shares":[]}';
  return JSON.parse(content);
}

async function writeRegistryToGist(gistId, registry) {
  const res = await gh(`/gists/${gistId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      files: { [REGISTRY_FILE]: { content: JSON.stringify(registry, null, 2) + '\n' } },
    }),
  });
  if (!res.ok) throw new Error('REGISTRY_WRITE_FAILED');
}

async function createRegistryGist(initial) {
  const res = await gh('/gists', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      description: REGISTRY_DESC,
      public: false,
      files: { [REGISTRY_FILE]: { content: JSON.stringify(initial, null, 2) + '\n' } },
    }),
  });
  if (!res.ok) throw new Error('REGISTRY_CREATE_FAILED');
  const gist = await res.json();
  localStorage.setItem(REGISTRY_GIST_KEY, gist.id);
  return gist.id;
}

async function loadRegistry() {
  let gistId = await findRegistryGist();
  if (gistId) {
    return { id: gistId, registry: await readRegistryFromGist(gistId) };
  }
  const initial = { version: 1, shares: [] };
  gistId = await createRegistryGist(initial);
  return { id: gistId, registry: initial };
}

async function createGist(payloadJson, description) {
  const res = await gh('/gists', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      description,
      public: false,
      files: { [PAYLOAD_FILE]: { content: payloadJson } },
    }),
  });
  if (!res.ok) throw new Error('GIST_CREATE_FAILED');
  return res.json();
}

async function deleteGist(gistId) {
  const res = await gh(`/gists/${encodeURIComponent(gistId)}`, { method: 'DELETE' });
  if (!res.ok && res.status !== 404) throw new Error('GIST_DELETE_FAILED');
}

// ── State ──────────────────────────────────────────────────────────
let state = {
  files: [],
  registry: { version: 1, shares: [] },
  registryId: null,
};

function shareFor(filePath) {
  return state.registry.shares.find(s => s.source === filePath);
}

function deriveStatus(file, share, currentHash) {
  if (!share) return 'unshared';
  if (share.source_hash !== currentHash) return 'stale';
  return 'shared';
}

function shareUrl(share) {
  return `${ORIGIN}/s/#${share.id}.${share.key}`;
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
    ' \u00b7 ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

// ── UI ─────────────────────────────────────────────────────────────
const mainEl  = document.getElementById('main');
const toastEl = document.getElementById('toast');

let toastTimeout;
function toast(msg, kind) {
  toastEl.textContent = msg;
  toastEl.className = 'toast show' + (kind === 'error' ? ' error' : '');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2400);
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function render() {
  if (state.files.length === 0) {
    mainEl.innerHTML = `<p class="empty">No files yet. Add an HTML file to <code>shares/</code> in the repo, then refresh.</p>`;
    return;
  }

  // Compute current source hashes for stale detection
  const hashEntries = await Promise.all(state.files.map(async f => {
    try {
      const content = await fetchSourceContent(f.path);
      const h = await sha256(content);
      return [f.path, { content, hash: h }];
    } catch {
      return [f.path, null];
    }
  }));
  const sourceMap = Object.fromEntries(hashEntries);

  let html = '';
  for (const f of state.files) {
    const share = shareFor(f.path);
    const src = sourceMap[f.path];
    const status = src ? deriveStatus(f, share, src.hash) : 'unshared';

    html += `<div class="file-row" data-path="${escapeHtml(f.path)}">`;
    html += `<div>`;
    html += `<div class="file-head">`;
    html += `<span class="file-name">${escapeHtml(share?.title || f.name)}</span>`;
    html += `<span class="badge ${status}">${status === 'unshared' ? 'unshared' : status === 'stale' ? 'stale' : 'shared'}</span>`;
    html += `</div>`;
    html += `<div class="file-meta">${escapeHtml(f.path)}</div>`;

    if (share) {
      const recipientLine = share.recipient ? `For ${escapeHtml(share.recipient)} \u00b7 ` : '';
      const dateLine = share.created_at ? `shared ${fmtDate(share.created_at)}` : '';
      html += `<div class="file-detail">${recipientLine}${dateLine}`;
      if (status === 'stale') {
        html += ` <span style="color: var(--warn);">\u2014 source changed since share</span>`;
      }
      html += `</div>`;
      html += `<div class="url-display" data-url="${escapeHtml(shareUrl(share))}" title="click to copy">${escapeHtml(shareUrl(share))}</div>`;
    }

    html += `</div>`;
    html += `<div class="actions">`;
    if (status === 'unshared') {
      html += `<button class="btn primary" data-action="share">Share</button>`;
    } else {
      if (status === 'stale') {
        html += `<button class="btn primary" data-action="reencrypt">Update</button>`;
      }
      html += `<button class="btn danger" data-action="revoke">Revoke</button>`;
    }
    html += `</div>`;
    html += `</div>`;
  }

  mainEl.innerHTML = html;

  mainEl.querySelectorAll('.file-row').forEach(row => {
    const path = row.dataset.path;
    const file = state.files.find(f => f.path === path);
    if (!file) return;
    const src = sourceMap[path];

    row.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const action = btn.dataset.action;
        const allBtns = row.querySelectorAll('.btn');
        allBtns.forEach(b => b.disabled = true);
        const origLabel = btn.textContent;
        btn.textContent = action === 'revoke' ? 'Revoking\u2026' : action === 'reencrypt' ? 'Updating\u2026' : 'Sharing\u2026';

        try {
          if (action === 'share') {
            const recipient = prompt('Recipient (optional, e.g. "Kevin Millslagle"):') || '';
            const title = prompt('Title (optional, defaults to filename):', file.name.replace(/\.html?$/, '')) || file.name;
            await shareFile(file, src, { recipient, title });
            toast('Shared');
          } else if (action === 'reencrypt') {
            await reencryptFile(file, src);
            toast('Updated \u2014 same URL');
          } else if (action === 'revoke') {
            if (!confirm('Revoke this share? The gist is deleted; recipients may see CDN-cached content for ~1 minute before getting a 404.')) {
              btn.textContent = origLabel;
              allBtns.forEach(b => b.disabled = false);
              return;
            }
            await revokeFile(file);
            toast('Revoked');
          }
        } catch (err) {
          console.error(err);
          toast(err.message || 'Failed', 'error');
        }
        await load();
      });
    });

    row.querySelectorAll('.url-display').forEach(el => {
      el.addEventListener('click', async () => {
        await copyToClipboard(el.dataset.url, el);
        toast('Copied');
      });
    });
  });
}

async function copyToClipboard(text, displayEl) {
  try {
    await navigator.clipboard.writeText(text);
    if (displayEl) {
      displayEl.classList.add('copied');
      setTimeout(() => displayEl.classList.remove('copied'), 1400);
    }
  } catch {
    toast('Copy failed', 'error');
  }
}

// ── Operations ─────────────────────────────────────────────────────
async function shareFile(file, src, { recipient, title }) {
  if (!src) throw new Error('Source unreachable');
  const enc = await encryptText(src.content);
  const payload = JSON.stringify({ v: 1, iv: enc.iv, ct: enc.ct });
  const titleText = title.trim() || file.name;
  const description = `[neves-share] ${titleText}${recipient.trim() ? ` \u2192 ${recipient.trim()}` : ''}`;
  const gist = await createGist(payload, description);

  const entry = {
    id: gist.id,
    key: enc.key,
    source: file.path,
    title: title.trim() || file.name,
    recipient: recipient.trim(),
    created_at: new Date().toISOString(),
    source_hash: src.hash,
  };

  const next = { ...state.registry, shares: [...state.registry.shares, entry] };
  await writeRegistryToGist(state.registryId, next);
  state.registry = next;
}

async function reencryptFile(file, src) {
  if (!src) throw new Error('Source unreachable');
  const share = shareFor(file.path);
  if (!share) throw new Error('No existing share');

  // Re-encrypt with the SAME key so URL stays valid.
  const keyBytes = (() => {
    const padded = share.key + '=='.slice(0, (4 - share.key.length % 4) % 4);
    const std = padded.replace(/-/g, '+').replace(/_/g, '/');
    const bin = atob(std);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  })();
  const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, 'AES-GCM', false, ['encrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, cryptoKey, new TextEncoder().encode(src.content));
  const payload = JSON.stringify({
    v: 1,
    iv: b64urlEncode(iv),
    ct: b64urlEncode(new Uint8Array(ct)),
  });

  // Update the gist (PATCH same gist_id).
  const res = await gh(`/gists/${encodeURIComponent(share.id)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: { [PAYLOAD_FILE]: { content: payload } } }),
  });
  if (!res.ok) throw new Error('GIST_UPDATE_FAILED');

  const shares = state.registry.shares.map(s =>
    s.source === file.path ? { ...s, source_hash: src.hash, updated_at: new Date().toISOString() } : s
  );
  const next = { ...state.registry, shares };
  await writeRegistryToGist(state.registryId, next);
  state.registry = next;
}

async function revokeFile(file) {
  const share = shareFor(file.path);
  if (!share) return;
  await deleteGist(share.id);
  const shares = state.registry.shares.filter(s => s.source !== file.path);
  const next = { ...state.registry, shares };
  await writeRegistryToGist(state.registryId, next);
  state.registry = next;
}

// ── Bootstrap ──────────────────────────────────────────────────────
async function load() {
  try {
    const [files, reg] = await Promise.all([listSourceFiles(), loadRegistry()]);
    state.files = files;
    state.registry = reg.registry;
    state.registryId = reg.id;
  } catch (err) {
    console.error(err);
    mainEl.innerHTML = `<p class="empty" style="color: var(--danger);">Couldn't load: ${escapeHtml(err.message)}</p>`;
    return;
  }
  await render();
}

load();
</script>
