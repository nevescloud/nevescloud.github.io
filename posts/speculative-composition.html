<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="no-referrer">
<title>Draft post · neves.cloud</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --text: #1a202c;
    --text-secondary: #4a5568;
    --text-tertiary: #718096;
    --border: #e2e8f0;
    --accent: #00539B;
    --danger: #c53030;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --font-display: 'Source Serif 4', Georgia, serif;
    --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  #post-frame {
    display: block;
    width: 100vw;
    height: 100vh;
    border: none;
    background: var(--bg);
  }

  .gate {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 9999;
    animation: fade-in 0.25s var(--ease);
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .gate-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 32px 28px;
    text-align: center;
    max-width: 380px;
    width: calc(100% - 32px);
    box-shadow: var(--shadow);
  }
  .gate-eyebrow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .gate-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
    line-height: 1.2;
  }
  .gate-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .gate-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #24292f;
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s var(--ease);
  }
  .gate-btn:hover { opacity: 0.88; }
  .gate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .gate-error {
    color: var(--danger);
    font-size: 12px;
    margin-top: 14px;
    line-height: 1.5;
    min-height: 18px;
  }
  .gate-loading {
    color: var(--text-tertiary);
    font-size: 12px;
    margin-top: 14px;
    min-height: 18px;
    font-family: 'SF Mono', monospace;
  }
  .gate-meta {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-top: 22px;
    font-family: 'SF Mono', monospace;
    letter-spacing: 0.04em;
  }

  body[data-state="loading"] #post-frame,
  body[data-state="gated"]   #post-frame { display: none; }
  body[data-state="loaded"]  .gate       { display: none; }
</style>
</head>
<body data-state="loading">

<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-eyebrow">Draft</div>
    <div class="gate-title">A piece of writing in progress</div>
    <div class="gate-subtitle">Sign in with GitHub to view. Repository read access required.</div>
    <button class="gate-btn" id="signin-btn" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      <span id="signin-label">Sign in with GitHub</span>
    </button>
    <div class="gate-error" id="error"></div>
    <div class="gate-loading" id="loading"></div>
    <div class="gate-meta">neves.cloud · drafts</div>
  </div>
</div>

<iframe id="post-frame" title="Draft post"></iframe>

<script type="module">
'use strict';

const AUTH_KEY  = '__draft_auth';
const REPO      = 'jonasneves/jonasneves.github.io';
const POST_PATH = '.claude/posts/speculative-composition.html';

const body      = document.body;
const errorEl   = document.getElementById('error');
const loadingEl = document.getElementById('loading');
const signinBtn = document.getElementById('signin-btn');
const labelEl   = document.getElementById('signin-label');

const setState    = (s) => { body.dataset.state = s; };
const showError   = (m) => { errorEl.textContent = m; loadingEl.textContent = ''; };
const showLoading = (m) => { loadingEl.textContent = m; errorEl.textContent = ''; };
const getAuth     = () => { try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch { return null; } };
const setAuth     = (a) => localStorage.setItem(AUTH_KEY, JSON.stringify(a));
const clearAuth   = ()  => localStorage.removeItem(AUTH_KEY);

let _authLib = null;
async function loadAuthLib() {
  if (!_authLib) _authLib = await import('https://auth.neevs.io/lib.js');
  return _authLib;
}

async function fetchPrivateContent(token) {
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${POST_PATH}`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3.raw' },
  });
  if (res.status === 401) throw new Error('TOKEN_EXPIRED');
  if (res.status === 403 || res.status === 404) throw new Error('NO_ACCESS');
  if (!res.ok) throw new Error('FETCH_FAILED');
  return res.text();
}

function renderPost(html) {
  const frame = document.getElementById('post-frame');
  frame.srcdoc = html;
  setState('loaded');
}

async function tryExistingAuth() {
  const auth = getAuth();
  if (!auth?.token) return false;
  try {
    showLoading('Verifying session');
    const { verifyToken } = await loadAuthLib();
    await verifyToken(auth.token);
    showLoading('Loading draft');
    const html = await fetchPrivateContent(auth.token);
    renderPost(html);
    return true;
  } catch (err) {
    if (err.message === 'TOKEN_EXPIRED') {
      clearAuth();
      showError('Session expired. Please sign in again.');
    } else if (err.message === 'NO_ACCESS') {
      showError('You do not have access to this draft.');
    } else {
      showError('Failed to load. Try again.');
    }
    return false;
  }
}

signinBtn.addEventListener('click', async () => {
  signinBtn.disabled = true;
  labelEl.textContent = 'Opening GitHub';
  showLoading('');
  try {
    const { connectGitHub } = await loadAuthLib();
    const r = await connectGitHub('repo', 'neevs_io');
    setAuth({ token: r.token, login: r.username, avatar_url: r.avatarUrl });
    labelEl.textContent = 'Loading';
    showLoading('Fetching draft');
    const html = await fetchPrivateContent(r.token);
    renderPost(html);
  } catch (err) {
    signinBtn.disabled = false;
    labelEl.textContent = 'Sign in with GitHub';
    if (err.message === 'NO_ACCESS') {
      showError('You do not have access to this draft.');
    } else {
      showError(err.message || 'Sign-in failed.');
    }
  }
});

(async () => {
  showLoading('Checking session');
  const ok = await tryExistingAuth();
  if (!ok) {
    setState('gated');
    signinBtn.disabled = false;
    showLoading('');
  }
})();
</script>
</body>
</html>
