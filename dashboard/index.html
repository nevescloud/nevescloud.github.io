<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1d20" media="(prefers-color-scheme: dark)">
  <meta name="robots" content="noindex,nofollow">
  <title>dashboard · neves.cloud</title>
  <link rel="icon" type="image/svg+xml" href="../icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: light dark;
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-hover: rgba(0,0,0,0.04);
      --ink: #1d1d1f;
      --ink-muted: #6e6e73;
      --border-subtle:  rgba(0,0,0,0.06);
      --border-default: rgba(0,0,0,0.10);
      --border-strong:  rgba(0,0,0,0.18);
      --brand-heading: #00563f;
      --accent: #006d51;
      --punct: #E89923;
      --status-ok:    #2f855a;
      --status-warn:  #c47c1d;
      --status-err:   #c0382c;
      --radius: 8px;
      --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
      --t-display: 1.75rem;
      --t-body:    0.9375rem;
      --t-caption: 0.75rem;
      --t-micro:   0.6875rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1d20;
        --surface: #212529;
        --surface-hover: rgba(255,255,255,0.04);
        --ink: #e9ecef;
        --ink-muted: #adb5bd;
        --border-subtle:  rgba(255,255,255,0.06);
        --border-default: rgba(255,255,255,0.10);
        --border-strong:  rgba(255,255,255,0.18);
        --brand-heading: #54a679;
        --accent: #66b288;
        --status-ok:    #68d391;
        --status-warn:  #d29922;
        --status-err:   #f06b62;
      }
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", ui-sans-serif, sans-serif;
      line-height: 1.5;
      font-synthesis: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
      gap: 2.5rem;
    }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    header {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fade-up 0.5s var(--ease) both;
    }

    .back {
      font-size: var(--t-caption);
      color: var(--ink-muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      transition: color 0.15s var(--ease);
      width: fit-content;
    }
    .back:hover { color: var(--ink); }

    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }
    .page-title {
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Helvetica Neue", ui-sans-serif, sans-serif;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--ink);
      font-weight: 600;
    }

    .plan-toggle { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .plan-label {
      font-size: var(--t-micro);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      transition: color 0.15s;
    }
    .plan-label.active { color: var(--ink); }
    .plan-switch {
      position: relative;
      width: 32px;
      height: 18px;
      background: var(--surface);
      border: 1px solid var(--border-default);
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .plan-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ink-muted);
      transition: transform 0.2s var(--ease), background 0.2s;
    }
    .plan-switch.pro {
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      border-color: color-mix(in srgb, var(--accent) 35%, transparent);
    }
    .plan-switch.pro::after {
      transform: translateX(14px);
      background: var(--accent);
    }

    #content {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fade-up 0.5s 0.1s var(--ease) both;
    }

    .section { display: flex; flex-direction: column; gap: 0.5rem; }
    .heading {
      font-size: var(--t-micro);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      padding-left: 1px;
      margin-bottom: 0.125rem;
    }
    .empty {
      font-size: var(--t-caption);
      color: var(--ink-muted);
      opacity: 0.6;
      padding: 0.25rem 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.625rem 0.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border-default);
      background: var(--surface);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
      min-width: 0;
    }
    .item:hover {
      border-color: var(--border-strong);
      background: var(--surface-hover);
    }
    .item:focus-visible { outline-offset: 1px; }

    .item-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }
    .item-title {
      font-size: var(--t-body);
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta {
      font-size: var(--t-caption);
      color: var(--ink-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-right {
      flex-shrink: 0;
      font-size: var(--t-caption);
      color: var(--ink-muted);
      text-align: right;
    }

    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok    { background: var(--status-ok); }
    .dot-warn  { background: var(--status-warn); }
    .dot-err   { background: var(--status-err); }

    .usage-card {
      padding: 0.75rem 0.875rem;
      border-radius: var(--radius);
      border: 1px solid var(--border-default);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }
    .usage-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .usage-label { font-size: var(--t-body); font-weight: 500; color: var(--ink); }
    .usage-value { font-size: var(--t-caption); color: var(--ink-muted); font-variant-numeric: tabular-nums; }
    .bar-track {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border-subtle);
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s var(--ease);
    }
    .bar-fill.low  { background: var(--status-ok); }
    .bar-fill.mid  { background: var(--status-warn); }
    .bar-fill.high { background: var(--status-err); }

    .note {
      font-size: var(--t-micro);
      color: var(--ink-muted);
      opacity: 0.75;
      line-height: 1.5;
      margin-top: 0.375rem;
    }
    .note a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }

    /* arrow on links inside items */
    .item-arrow {
      flex-shrink: 0;
      width: 14px; height: 14px;
      color: var(--ink-muted);
      opacity: 0.5;
      transition: opacity 0.15s, transform 0.15s, color 0.15s;
    }
    .item:hover .item-arrow {
      opacity: 1;
      color: var(--punct);
      transform: translateX(2px);
    }

    footer {
      font-size: var(--t-micro);
      color: var(--ink-muted);
      opacity: 0.55;
      letter-spacing: 0.03em;
      margin-top: auto;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <header>
    <a class="back" href="../">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9.5 6H2.5M2.5 6L5.5 3M2.5 6L5.5 9"/>
      </svg>
      neves.cloud
    </a>
    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <div class="plan-toggle">
        <span id="plan-free-label" class="plan-label">Free</span>
        <div id="plan-switch" class="plan-switch" role="switch" tabindex="0" aria-label="Toggle plan"></div>
        <span id="plan-pro-label" class="plan-label">Pro</span>
      </div>
    </div>
  </header>

  <div id="content"><p class="empty">loading…</p></div>

  <footer>&copy; 2026 Jonas Neves</footer>

  <script type="module">
  const AUTH_KEY = '__neevs_auth';
  const QUOTA_KEY = '__neevs_actions_quota';
  const CACHE_KEY = '__neevs_dash_cache';
  const CACHE_TTL = 2 * 60 * 1000;
  const REPOS_CACHE_KEY = '__neevs_repos_cache';
  const MAX_USAGE_PAGES = 3;

  // Sites this operator runs pip-relay for. The dashboard's own host is
  // assumed to be one of them; add entries for additional tenants.
  // Manifest is fetched same-origin so a tenant's facts live with the tenant.
  const PIP_RELAY_SITES = [
    {
      siteId: location.host,
      label: location.host,
      manifest: `${location.origin}/manifest.json`,
    },
  ];

  let auth;
  try { auth = JSON.parse(localStorage.getItem(AUTH_KEY)); } catch {}
  if (!auth?.token) { location.href = '../'; }

  const contentEl = document.getElementById('content');
  const planSwitch = document.getElementById('plan-switch');
  const freeLabel = document.getElementById('plan-free-label');
  const proLabel = document.getElementById('plan-pro-label');

  const PLAN_MINUTES = { free: 2000, pro: 3000 };

  let dashState = null;

  function getPlan() {
    const v = localStorage.getItem(QUOTA_KEY);
    return v === 'free' ? 'free' : 'pro';
  }

  function setPlan(plan) {
    localStorage.setItem(QUOTA_KEY, plan);
    updatePlanUI(plan);
  }

  function updatePlanUI(plan) {
    const isPro = plan === 'pro';
    planSwitch.classList.toggle('pro', isPro);
    planSwitch.setAttribute('aria-checked', isPro);
    freeLabel.classList.toggle('active', !isPro);
    proLabel.classList.toggle('active', isPro);
  }

  updatePlanUI(getPlan());

  planSwitch.addEventListener('click', () => {
    const next = getPlan() === 'pro' ? 'free' : 'pro';
    setPlan(next);
    if (dashState) render(dashState, PLAN_MINUTES[next]);
  });
  planSwitch.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); planSwitch.click(); }
  });

  function cacheGet(key) {
    try {
      const entry = JSON.parse(sessionStorage.getItem(key));
      if (entry && Date.now() - entry.ts < CACHE_TTL) return entry.data;
    } catch {}
    return null;
  }
  function cacheSet(key, data) {
    try { sessionStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch {}
  }

  function gh(path) {
    return fetch(`https://api.github.com${path}`, {
      headers: { Authorization: `Bearer ${auth.token}`, Accept: 'application/vnd.github+json' }
    });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function ago(dateStr) {
    const ms = Date.now() - new Date(dateStr).getTime();
    const m = Math.floor(ms / 60000);
    if (m < 60) return `${m}m`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h`;
    return `${Math.floor(h / 24)}d`;
  }

  const ARROW = '<svg class="item-arrow" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 6H9.5M9.5 6L6.5 3M9.5 6L6.5 9"/></svg>';

  async function load() {
    const cached = cacheGet(CACHE_KEY);
    if (cached) {
      dashState = cached;
      render(cached, PLAN_MINUTES[getPlan()]);
      return;
    }

    let repos = cacheGet(REPOS_CACHE_KEY);
    const needRepos = !repos;
    const fetches = [
      gh(`/user/issues?filter=created&state=open&per_page=50`),
    ];
    if (needRepos) fetches.push(gh('/user/repos?per_page=100&sort=pushed&affiliation=owner'));

    const results = await Promise.allSettled(fetches);

    let prs = [];
    if (results[0].status === 'fulfilled' && results[0].value.ok) {
      const items = await results[0].value.json();
      prs = items
        .filter(i => i.pull_request)
        .map(pr => ({
          title: pr.title,
          repo: pr.repository_url.split('/').slice(-1)[0],
          url: pr.html_url,
          age: ago(pr.created_at),
          draft: pr.draft,
        }));
    }

    if (needRepos) {
      if (results[1].status === 'fulfilled' && results[1].value.ok) {
        repos = await results[1].value.json();
        cacheSet(REPOS_CACHE_KEY, repos);
      } else {
        repos = [];
      }
    }

    const now = new Date();
    const cycleStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0, 10);
    const activeRepos = repos.slice(0, 12);

    const ci = [];
    let totalMs = 0;
    const usageByRepo = [];

    await Promise.allSettled(
      activeRepos.map(async r => {
        try {
          if (r.private) {
            let allRuns = [];
            for (let page = 1; page <= MAX_USAGE_PAGES; page++) {
              const res = await gh(`/repos/${r.full_name}/actions/runs?per_page=100&created=>${cycleStart}&status=completed&page=${page}`);
              if (!res.ok) break;
              const data = await res.json();
              const runs = data.workflow_runs || [];
              allRuns.push(...runs);
              if (runs.length < 100) break;
            }
            const latestRes = await gh(`/repos/${r.full_name}/actions/runs?per_page=1`);
            if (latestRes.ok) {
              const latestData = await latestRes.json();
              const run = latestData.workflow_runs?.[0];
              if (run) {
                ci.push({
                  repo: r.name, workflow: run.name,
                  conclusion: run.conclusion, status: run.status,
                  url: run.html_url, age: ago(run.updated_at),
                });
              }
            }
            let repoMs = 0;
            for (const run of allRuns) {
              repoMs += run.run_started_at ? new Date(run.updated_at) - new Date(run.run_started_at) : 0;
            }
            if (repoMs > 0) {
              totalMs += repoMs;
              usageByRepo.push({ repo: r.name, minutes: Math.round(repoMs / 60000) });
            }
          } else {
            const res = await gh(`/repos/${r.full_name}/actions/runs?per_page=1`);
            if (!res.ok) return;
            const data = await res.json();
            const run = data.workflow_runs?.[0];
            if (run) {
              ci.push({
                repo: r.name, workflow: run.name,
                conclusion: run.conclusion, status: run.status,
                url: run.html_url, age: ago(run.updated_at),
              });
            }
          }
        } catch {}
      })
    );

    usageByRepo.sort((a, b) => b.minutes - a.minutes);

    dashState = {
      prs,
      failing: ci.filter(r => r.conclusion === 'failure'),
      running: ci.filter(r => r.status !== 'completed'),
      allCi: ci,
      usage: { totalMinutes: Math.round(totalMs / 60000), byRepo: usageByRepo },
    };

    cacheSet(CACHE_KEY, dashState);
    render(dashState, PLAN_MINUTES[getPlan()]);
  }

  function render(state, includedMinutes) {
    const { prs, failing, running, allCi, usage } = state;
    let html = '';

    // Pip-relay section first — operator-facing surface, daily-driver value.
    html += '<div class="section"><p class="heading">Pip-relay sites</p>';
    if (PIP_RELAY_SITES.length === 0) {
      html += '<p class="empty">no sites configured</p>';
    } else {
      for (const s of PIP_RELAY_SITES) {
        const url = `./pip-relay/?site=${encodeURIComponent(s.siteId)}&manifest=${encodeURIComponent(s.manifest)}`;
        html += `<a class="item" href="${esc(url)}">
          <div class="item-body">
            <span class="item-title">${esc(s.label)}</span>
            <span class="item-meta">click to host the lobby</span>
          </div>
          ${ARROW}
        </a>`;
      }
    }
    html += '</div>';

    html += '<div class="section"><p class="heading">Open pull requests</p>';
    if (prs.length === 0) {
      html += '<p class="empty">none</p>';
    } else {
      for (const pr of prs) {
        html += `<a class="item" href="${esc(pr.url)}" target="_blank" rel="noopener">
          <div class="item-body">
            <span class="item-title">${esc(pr.title)}</span>
            <span class="item-meta">${esc(pr.repo)}${pr.draft ? ' · draft' : ''}</span>
          </div>
          <span class="item-right">${pr.age}</span>
        </a>`;
      }
    }
    html += '</div>';

    html += '<div class="section"><p class="heading">CI status</p>';
    if (failing.length === 0 && running.length === 0) {
      const passing = allCi.filter(r => r.conclusion === 'success').length;
      html += `<p class="empty">${passing > 0 ? `all clear — ${passing} passing` : 'no recent runs'}</p>`;
    } else {
      for (const r of [...failing, ...running]) {
        const isFail = r.conclusion === 'failure';
        const isRunning = r.status !== 'completed';
        const dotClass = isFail ? 'dot-err' : isRunning ? 'dot-warn' : '';
        const label = isFail ? 'failing' : isRunning ? 'running' : r.conclusion;
        html += `<a class="item" href="${esc(r.url)}" target="_blank" rel="noopener">
          <span class="dot ${dotClass}"></span>
          <div class="item-body">
            <span class="item-title">${esc(r.repo)}</span>
            <span class="item-meta">${esc(r.workflow)} · ${label}</span>
          </div>
          <span class="item-right">${r.age}</span>
        </a>`;
      }
    }
    html += '</div>';

    const totalMinutes = usage.totalMinutes;
    html += '<div class="section"><p class="heading">Actions usage · this month (approx)</p>';
    const pct = includedMinutes > 0 ? Math.min((totalMinutes / includedMinutes) * 100, 100) : 0;
    const fillClass = pct < 50 ? 'low' : pct < 80 ? 'mid' : 'high';
    html += `<div class="usage-card">
      <div class="usage-header">
        <span class="usage-label">Minutes</span>
        <span class="usage-value">${totalMinutes} / ${includedMinutes}</span>
      </div>
      <div class="bar-track"><div class="bar-fill ${fillClass}" style="width:${pct.toFixed(1)}%"></div></div>
    </div>`;
    if (usage.byRepo.length > 0) {
      for (const r of usage.byRepo) {
        html += `<div class="item" style="cursor:default">
          <div class="item-body"><span class="item-title">${esc(r.repo)}</span></div>
          <span class="item-right">${r.minutes} min</span>
        </div>`;
      }
    }
    html += `<p class="note">
      Estimated from run wall-clock time. Actual billing rounds each job up to 1 min and applies OS multipliers (macOS 10x, Windows 2x).
      <a href="https://github.com/settings/billing/summary" target="_blank" rel="noopener">View exact usage</a>
    </p>`;
    html += '</div>';

    contentEl.innerHTML = html;
  }

  load();
  </script>

</body>
</html>
