<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
  /* Two-way fork, before anything renders:
     - e-ink readers (Kindle/Kobo/…) typing neves.cloud still land on the
       live reader. /reader is Cloudflare-routed (never serves this page),
       so no loop. Fire tablets (Silk) are modern Chromium and fall through.
     - everyone else → jonasneves.com, the single front door. */
  (function () {
    try {
      var u = navigator.userAgent || "";
      if (/Kindle|Kobo|reMarkable|PocketBook|Boox/.test(u) && !/Silk/.test(u)) {
        location.replace("https://neves.cloud/reader");
        return;
      }
    } catch (e) {}
    location.replace("https://jonasneves.com/");
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <!-- No-JS fallback; the script above handles the e-ink branch first. -->
  <meta http-equiv="refresh" content="0; url=https://jonasneves.com/">
  <link rel="canonical" href="https://jonasneves.com/">
  <title>Redirecting…</title>
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 4rem auto;
      max-width: 32rem;
      padding: 0 1.5rem;
      color: #6e6e73;
      line-height: 1.5;
    }
    a { color: inherit; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1d20; color: #adb5bd; }
    }
  </style>
</head>
<body>
  <p>This has moved to <a href="https://jonasneves.com">jonasneves.com</a>. Redirecting…</p>
</body>
</html>
